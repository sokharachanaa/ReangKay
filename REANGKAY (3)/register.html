<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>REANGKAY | បង្កើតគណនី</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/animation.css">
</head>
<body>


<div class="auth-shell">
  <div class="card-r auth-card fade-in" style="max-width:480px;">
    <div class="text-center mb-3">
      <h3 class="mb-1">បង្កើតគណនីរបស់អ្នក</h3>
      <p class="text-muted-r small">ចូលរួមជាមួយ REANGKAY ហើយចាប់ផ្តើមដំណើររបស់អ្នក</p>
    </div>

    <form data-mock-submit="បង្កើតគណនីជោគជ័យ — សូមស្វាគមន៍!" data-redirect="login.html">
      <label class="avatar-upload mx-auto" for="avatarInput">
        <i class="fa-solid fa-camera"></i>
        <span class="cam-badge"><i class="fa-solid fa-plus"></i></span>
      </label>
      <input type="file" id="avatarInput" accept="image/*" class="d-none">

      <div class="mb-3">
        <label class="form-label small fw-semibold">ឈ្មោះអ្នកប្រើប្រាស់</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" class="form-control form-control-r" placeholder="ជ្រើសរើសឈ្មោះអ្នកប្រើប្រាស់" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">អ៊ីមែល</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" class="form-control form-control-r" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold d-block">ភេទ</label>
        <div class="gender-pick">
          <label>
            <input type="radio" name="gender" value="male">
            <div class="gender-option g-male"><i class="fa-solid fa-mars mb-1 d-block"></i>ប្រុស</div>
          </label>
          <label>
            <input type="radio" name="gender" value="female">
            <div class="gender-option g-female"><i class="fa-solid fa-venus mb-1 d-block"></i>ស្រី</div>
          </label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">អាយុ</label>
        <select class="form-select form-select-r" required>
          <option value="" selected disabled>ជ្រើសរើសអាយុរបស់អ្នក</option>
          <option>១០ - ១២</option>
          <option>១៣ - ១៥</option>
          <option>១៦ - ១៨</option>
          <option>១៩+</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">ពាក្យសម្ងាត់</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-control form-control-r" placeholder="បង្កើតពាក្យសម្ងាត់" required>
          <button type="button" class="toggle-pass"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold">បញ្ជាក់ពាក្យសម្ងាត់</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-control form-control-r" placeholder="បញ្ចូលពាក្យសម្ងាត់ម្តងទៀត" required>
          <button type="button" class="toggle-pass"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary-r btn-lg-touch w-100 ripple">បង្កើតគណនី</button>
    </form>

    <p class="text-center small text-muted-r mt-4 mb-0">
      មានគណនីរួចហើយមែនទេ? <a href="login.html" class="fw-bold" style="color:var(--primary);">ចូលគណនី</a>
    </p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/navigation.js"></script>
<script>
document.getElementById('avatarInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const wrap = document.querySelector('.avatar-upload');
    wrap.style.backgroundImage = `url(${ev.target.result})`;
    wrap.style.backgroundSize = 'cover';
    wrap.style.backgroundPosition = 'center';
    wrap.querySelector('i').style.display = 'none';
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
