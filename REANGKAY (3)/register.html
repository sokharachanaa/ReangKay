<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>REANGKAY | Create Account</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/animation.css">
</head>
<body>

<div class="loading-screen"><div class="logo-pulse"></div></div>

<div class="auth-shell">
  <div class="card-r auth-card fade-in" style="max-width:480px;">
    <div class="text-center mb-3">
      <h3 class="mb-1">Create your account</h3>
      <p class="text-muted-r small">Join REANGKAY and start your journey</p>
    </div>

    <form data-mock-submit="Account created — welcome!" data-redirect="login.html">
      <label class="avatar-upload mx-auto" for="avatarInput">
        <i class="fa-solid fa-camera"></i>
        <span class="cam-badge"><i class="fa-solid fa-plus"></i></span>
      </label>
      <input type="file" id="avatarInput" accept="image/*" class="d-none">

      <div class="mb-3">
        <label class="form-label small fw-semibold">Username</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" class="form-control form-control-r" placeholder="Choose a username" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">Email</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" class="form-control form-control-r" placeholder="you@example.com" required>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold d-block">Gender</label>
        <div class="gender-pick">
          <label>
            <input type="radio" name="gender" value="male">
            <div class="gender-option g-male"><i class="fa-solid fa-mars mb-1 d-block"></i>Male</div>
          </label>
          <label>
            <input type="radio" name="gender" value="female">
            <div class="gender-option g-female"><i class="fa-solid fa-venus mb-1 d-block"></i>Female</div>
          </label>
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">Age</label>
        <select class="form-select form-select-r" required>
          <option value="" selected disabled>Select your age</option>
          <option>10 - 12</option>
          <option>13 - 15</option>
          <option>16 - 18</option>
          <option>19+</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label small fw-semibold">Password</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-control form-control-r" placeholder="Create a password" required>
          <button type="button" class="toggle-pass"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label small fw-semibold">Confirm Password</label>
        <div class="input-icon-wrap">
          <i class="fa-solid fa-lock"></i>
          <input type="password" class="form-control form-control-r" placeholder="Re-enter your password" required>
          <button type="button" class="toggle-pass"><i class="fa-solid fa-eye"></i></button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary-r btn-lg-touch w-100 ripple">Create Account</button>
    </form>

    <p class="text-center small text-muted-r mt-4 mb-0">
      Already have an account? <a href="login.html" class="fw-bold" style="color:var(--primary);">Log in</a>
    </p>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
<script src="js/navigation.js"></script>
<script>
document.getElementById('avatarInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(ev){
    const wrap = document.querySelector('.avatar-upload');
    wrap.style.backgroundImage = `url(${ev.target.result})`;
    wrap.style.backgroundSize = 'cover';
    wrap.style.backgroundPosition = 'center';
    wrap.querySelector('i').style.display = 'none';
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
