<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>REANGKAY | ចូលគណនី</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
<link rel="stylesheet" href="css/animation.css">
<link rel="stylesheet" href="css/onboarding.css">
</head>
<body class="onb-body">

  <div class="onb-shell">
    <div class="onb-logo"><span class="logo-dot">រ</span> REANGKAY</div>

    <div class="onb-card">
      <div class="onb-eyebrow"><a href="welcome.html" style="color:inherit;text-decoration:none;"><i class="fa-solid fa-arrow-left"></i> ត្រឡប់ក្រោយ</a></div>
      <h1 class="onb-title">ចូលគណនី</h1>
      <p class="onb-sub" id="loginSub">សូមចូលគណនី ដើម្បីបន្ត។</p>

      <form id="loginForm">
        <div class="onb-field">
          <label for="liEmail">អ៊ីមែល</label>
          <input type="email" id="liEmail" placeholder="you@example.com" required>
        </div>
        <div class="onb-field">
          <label for="liPassword">ពាក្យសម្ងាត់</label>
          <input type="password" id="liPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="onb-btn onb-btn-primary">ចូលគណនី <i class="fa-solid fa-arrow-right"></i></button>
      </form>
    </div>

    <p class="onb-foot-link">មិនទាន់មានគណនី? <a href="signup.html">បង្កើតគណនីថ្មី</a></p>
  </div>

  <script src="js/onboarding.js"></script>
  <script>
    // If the user arrived here from the "Personalize" card on the homepage,
    // show a short explanatory note.
    var params = new URLSearchParams(window.location.search);
    if (params.get('from') === 'personalize') {
      document.getElementById('loginSub').textContent =
        'សូមចូលគណនី ដើម្បីប្រើមុខងារធ្វើឲ្យបទពិសោធន៍ផ្ទាល់ខ្លួន និងឧបករណ៍តាមដានសុខភាព។';
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      Reangkay.setAuth('user');
      var hasProfile = !!Reangkay.getProfile();
      window.location.href = hasProfile ? 'index.html' : 'onboarding.html';
    });
  </script>
</body>
</html>
